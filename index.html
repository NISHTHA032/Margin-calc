<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Margin Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

canvas{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Margin Calculator</h2>

<input type="number" id="cost" placeholder="Cost Price">

<input type="number" id="selling" placeholder="Selling Price">

<button onclick="calculateMargin()">Calculate Margin</button>

<div class="result" id="result"></div>

<canvas id="marginChart"></canvas>

</div>

<script>

let chart;

function calculateMargin(){

let cost = parseFloat(document.getElementById("cost").value);
let selling = parseFloat(document.getElementById("selling").value);

if(isNaN(cost) || isNaN(selling)){
    document.getElementById("result").innerHTML = "Please enter valid numbers";
    return;
}

if(selling <= 0){
    document.getElementById("result").innerHTML = "Selling price must be greater than 0";
    return;
}

let profit = selling - cost;
let margin = (profit / selling) * 100;

document.getElementById("result").innerHTML =
"Profit Margin: " + margin.toFixed(2) + "%";

drawChart(cost, profit);

}

function drawChart(cost, profit){

let ctx = document.getElementById("marginChart");

if(chart){
chart.destroy();
}

chart = new Chart(ctx,{
type:'pie',
data:{
labels:['Cost','Profit'],
datasets:[{
data:[cost, profit],
backgroundColor:[
'#ff6384',
'#36a2eb'
]
}]
},
options:{
responsive:true
}
});

}

</script>

</body>
</html>
