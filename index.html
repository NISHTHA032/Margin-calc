<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Margin Calculator</title>

<!-- favicon fix -->
<link rel="icon" href="data:,">

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

#calculator{
    background:white;
    padding:25px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

label{
    display:block;
    margin-bottom:6px;
    color:#555;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#3498db;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#2980b9;
}

#result{
    margin-top:15px;
    font-weight:bold;
    color:#27ae60;
}

canvas{
    margin-top:20px;
}

</style>
</head>

<body>

<div id="calculator">

<label>Cost:</label>
<input type="number" id="cost" placeholder="Enter cost">

<label>Quantity:</label>
<input type="number" id="quantity" placeholder="Enter quantity">

<button onclick="calculateMargin()">Calculate Margin</button>

<div id="result">Margin: 0.00%</div>

<canvas id="pieChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function calculateMargin(){

const cost = parseFloat(document.getElementById("cost").value);
const quantity = parseFloat(document.getElementById("quantity").value);

if(isNaN(cost) || isNaN(quantity) || quantity<=0){

document.getElementById("result").innerHTML = "Please enter valid numbers";
return;

}

const totalValue = cost * quantity;
const marginPercentage = ((totalValue - cost) / totalValue) * 100;

document.getElementById("result").innerHTML =
"Margin: " + marginPercentage.toFixed(2) + "%";


const data = {
labels:["Margin","Cost"],
datasets:[{
data:[marginPercentage,100-marginPercentage],
backgroundColor:["#27ae60","#e74c3c"]
}]
};

const ctx = document.getElementById("pieChart");


// destroy existing chart safely
let existingChart = Chart.getChart(ctx);

if(existingChart){
existingChart.destroy();
}

new Chart(ctx,{
type:"pie",
data:data,
options:{
responsive:true,
plugins:{
legend:{
position:"top"
}
}
}
});

}

</script>

</body>
</html>
